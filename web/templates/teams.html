{% extends "base.html" %}
{% block title %}Teams – Scottish Ice Hockey{% endblock %}

{% block content %}
<h1 class="page-title">Teams</h1>

<div class="team-grid">
  {% for t in teams %}
    <a href="{{ url_for('team_detail', slug=t.slug) }}" class="team-card">
      <div class="team-card-logo">
        {% if t.logo %}
          <img src="{{ url_for('static', filename='img/teams/' + t.logo) }}?v={{ static_version }}"
               alt="{{ t.full }}"
               class="team-logo-lg"
               onerror="this.style.display='none'">
        {% endif %}
      </div>
      <div class="team-card-info">
        <div class="team-card-name">{{ t.full }}</div>
      </div>
    </a>
  {% endfor %}
</div>
{% endblock %}
